[build]
  base = "frontend"
  command = "pnpm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  NEXT_PUBLIC_API_URL = "https://domain-market-intelligence-api.onrender.com"
  # Disable auto-injected Next.js SSR plugin — this site uses output:"export" (static HTML)
  # The plugin expects .next/ but static export creates out/; disabling prevents init failure
  NETLIFY_SKIP_PLUGIN_NEXTJS = "true"
